##
# Local WooCommerce development environment for wp-houla plugin.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   → WordPress: http://localhost:8080
#   → Admin:     http://localhost:8080/wp-admin  (admin / admin)
#
# First-time setup (after containers are up):
#   docker compose -f docker-compose.dev.yml exec wordpress bash /var/www/html/wp-content/plugins/wp-houla/scripts/setup-dev.sh
#
# Tear down (preserves data):
#   docker compose -f docker-compose.dev.yml down
#
# Full reset (destroys data):
#   docker compose -f docker-compose.dev.yml down -v
##

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wppass
    volumes:
      - wp_db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  wordpress:
    image: wordpress:6.8-php8.2-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      PHP_MEMORY_LIMIT: "512M"
      # Enable wp-houla dev mode to point to local API
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WPHOULA_DEV_MODE', true );
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_MEMORY_LIMIT', '512M' );
    volumes:
      # Mount wp-houla plugin directly from git repo
      - .:/var/www/html/wp-content/plugins/wp-houla
      # Persist WordPress files and other plugins
      - wp_html:/var/www/html
    # Install WP-CLI on startup
    entrypoint: >
      bash -c '
        # Install WP-CLI if missing
        if [ ! -f /usr/local/bin/wp ]; then
          curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          mv wp-cli.phar /usr/local/bin/wp
        fi
        # Run default WordPress entrypoint
        exec docker-entrypoint.sh apache2-foreground
      '

volumes:
  wp_db_data:
  wp_html:
