name: Build & Upload Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build plugin zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from plugin header
        id: version
        run: |
          VERSION=$(grep -oP 'Version:\s*\K[\d.]+' master/wp-houla/wp-houla.php)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Plugin version: $VERSION"

      - name: Build zip package
        run: |
          mkdir -p build
          cp -r master/wp-houla build/wp-houla

          # Remove dev files
          cd build
          find . -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name ".gitignore" -delete 2>/dev/null || true
          find . -name ".DS_Store" -delete 2>/dev/null || true
          find . -name "Thumbs.db" -delete 2>/dev/null || true
          find . -name "*.log" -delete 2>/dev/null || true
          find . -name "node_modules" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "phpunit.xml*" -delete 2>/dev/null || true
          find . -name "phpcs.xml" -delete 2>/dev/null || true
          find . -name "composer.*" -delete 2>/dev/null || true

          zip -r ../wp-houla-${{ steps.version.outputs.version }}.zip wp-houla/
          cd ..
          rm -rf build

          echo "Package size: $(du -h wp-houla-${{ steps.version.outputs.version }}.zip | cut -f1)"

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: wp-houla-${{ steps.version.outputs.version }}.zip
